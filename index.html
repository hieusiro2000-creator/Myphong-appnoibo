<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>Tổ Hợp Mỹ Phong</title>
  <meta name="theme-color" content="#004029">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icon-192.png">
  <link rel="icon" href="icon-192.png">
  <style>
    html, body { margin:0; padding:0; height:100%; overflow:hidden; }
    iframe { width:100%; height:100%; border:none; display:block; }

    /* [MỚI] Nút Làm mới nổi, dùng safe-area để không bị che bởi tai thỏ/thanh trạng thái */
    #btn-refresh {
      position: fixed;
      top: calc(10px + env(safe-area-inset-top, 0px));
      right: 10px;
      z-index: 9999;
      width: 40px; height: 40px;
      border-radius: 50%;
      background: rgba(0,64,41,0.85);
      color: #fff;
      border: none;
      display: flex; align-items: center; justify-content: center;
      font-size: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,.3);
      cursor: pointer;
    }
    #btn-refresh:active { transform: scale(0.92); }
    #btn-refresh.spinning { animation: spin 0.8s linear; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <iframe id="app-frame" src="https://script.google.com/macros/s/AKfycbwgOJS9n9tUEWiQ3HtGwndeOkDmcY_VE1Ld0veFYiOQH_gqlIoYJGkHreFjIgSu2OwJ/exec"></iframe>

  <!-- [MỚI] Nút làm mới toàn trang -->
  <button id="btn-refresh" title="Làm mới">&#8635;</button>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js');
    }

    document.getElementById('btn-refresh').addEventListener('click', function () {
      const btn = this;
      btn.classList.add('spinning');
      const frame = document.getElementById('app-frame');
      // Tải lại đúng URL gốc (đảm bảo về lại đúng app, không giữ lịch sử điều hướng lỗi bên trong iframe)
      frame.src = frame.src;
      setTimeout(function () { btn.classList.remove('spinning'); }, 800);
    });
  </script>
</body>
</html>
